<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smart Link Cloaker</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  /* ── Variables ── */
  :root {
    --bg:        #0a0a0f;
    --surface:   #111118;
    --surface2:  #18181f;
    --border:    #2a2a35;
    --border2:   #3a3a48;
    --accent:    #7c6dfa;
    --accent2:   #a78bfa;
    --accent-glow: rgba(124,109,250,0.25);
    --green:     #34d399;
    --red:       #f87171;
    --yellow:    #fbbf24;
    --text:      #e8e8f0;
    --text2:     #9090a8;
    --text3:     #5a5a72;
    --radius:    12px;
    --radius-sm: 8px;
  }

  /* ── Reset ── */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }
  body {
    font-family: 'Syne', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── Noise overlay ── */
  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
    pointer-events: none; z-index: 0; opacity: .4;
  }

  /* ── Background glow ── */
  .bg-glow {
    position: fixed;
    width: 600px; height: 600px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(124,109,250,0.07) 0%, transparent 70%);
    top: -200px; left: -200px;
    pointer-events: none; z-index: 0;
  }
  .bg-glow2 {
    position: fixed;
    width: 400px; height: 400px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(52,211,153,0.05) 0%, transparent 70%);
    bottom: -100px; right: -100px;
    pointer-events: none; z-index: 0;
  }

  /* ── Layout ── */
  .container {
    position: relative; z-index: 1;
    max-width: 1000px;
    margin: 0 auto;
    padding: 0 20px 80px;
  }

  /* ── Header ── */
  .header {
    padding: 40px 0 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid var(--border);
    margin-bottom: 32px;
    animation: fadeDown .5s ease both;
  }
  .header-left { display: flex; align-items: center; gap: 16px; }
  .logo {
    width: 48px; height: 48px;
    background: linear-gradient(135deg, var(--accent), #c084fc);
    border-radius: 14px;
    display: flex; align-items: center; justify-content: center;
    font-size: 22px;
    box-shadow: 0 0 30px var(--accent-glow);
  }
  .header-title h1 {
    font-size: 20px; font-weight: 800; color: var(--text);
    letter-spacing: -.02em;
  }
  .header-title p { font-size: 13px; color: var(--text2); margin-top: 2px; }
  .header-badge {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px; font-weight: 600;
    color: var(--green);
    background: rgba(52,211,153,.1);
    border: 1px solid rgba(52,211,153,.2);
    padding: 4px 10px;
    border-radius: 20px;
    letter-spacing: .06em;
  }

  /* ── Stats ── */
  .stats {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
    margin-bottom: 28px;
    animation: fadeUp .5s .1s ease both;
  }
  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 18px 20px;
    display: flex; align-items: center; gap: 14px;
    transition: border-color .2s;
  }
  .stat-card:hover { border-color: var(--border2); }
  .stat-icon {
    width: 42px; height: 42px;
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px; flex-shrink: 0;
  }
  .stat-icon.purple { background: rgba(124,109,250,.12); }
  .stat-icon.green  { background: rgba(52,211,153,.12); }
  .stat-icon.yellow { background: rgba(251,191,36,.12); }
  .stat-label { font-size: 11px; color: var(--text3); font-weight: 600; text-transform: uppercase; letter-spacing: .08em; }
  .stat-value { font-size: 28px; font-weight: 800; color: var(--text); line-height: 1.1; margin-top: 2px; letter-spacing: -.03em; }

  /* ── Card ── */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 24px;
    margin-bottom: 20px;
  }
  .card-title {
    font-size: 14px; font-weight: 700;
    color: var(--text);
    margin-bottom: 20px;
    display: flex; align-items: center; gap: 8px;
  }
  .card-title .dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--accent);
    box-shadow: 0 0 8px var(--accent);
  }

  /* ── Form ── */
  .form-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 14px;
  }
  .form-full { grid-column: 1 / -1; }
  .field { display: flex; flex-direction: column; gap: 6px; }
  .field label {
    font-size: 11px; font-weight: 700;
    color: var(--text3);
    text-transform: uppercase;
    letter-spacing: .08em;
    font-family: 'JetBrains Mono', monospace;
  }
  .field input, .field textarea {
    background: var(--surface2);
    border: 1.5px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 11px 14px;
    font-size: 14px;
    color: var(--text);
    font-family: 'Syne', sans-serif;
    outline: none;
    transition: border-color .2s, box-shadow .2s;
    resize: vertical;
  }
  .field input::placeholder, .field textarea::placeholder { color: var(--text3); }
  .field input:focus, .field textarea:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--accent-glow);
    background: #13131c;
  }
  .field .hint {
    font-size: 11px; color: var(--text3);
    font-family: 'JetBrains Mono', monospace;
  }
  .field .hint span { color: var(--accent2); }

  /* ── Buttons ── */
  .btn {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 11px 22px;
    border-radius: var(--radius-sm);
    font-size: 14px; font-weight: 700;
    font-family: 'Syne', sans-serif;
    cursor: pointer; border: none;
    transition: transform .1s, box-shadow .2s, opacity .2s;
    letter-spacing: -.01em;
  }
  .btn:active { transform: translateY(1px); }
  .btn-primary {
    background: linear-gradient(135deg, var(--accent) 0%, #a78bfa 100%);
    color: #fff;
    box-shadow: 0 0 20px var(--accent-glow);
  }
  .btn-primary:hover { box-shadow: 0 0 30px rgba(124,109,250,.4); }
  .btn-primary:disabled { opacity: .5; cursor: not-allowed; }
  .btn-ghost {
    background: var(--surface2);
    color: var(--text2);
    border: 1px solid var(--border);
    font-size: 12px;
    padding: 7px 13px;
  }
  .btn-ghost:hover { border-color: var(--border2); color: var(--text); }
  .btn-danger {
    background: rgba(248,113,113,.1);
    color: var(--red);
    border: 1px solid rgba(248,113,113,.2);
    font-size: 12px;
    padding: 7px 13px;
  }
  .btn-danger:hover { background: rgba(248,113,113,.18); }
  .btn-icon {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text2);
    padding: 7px 10px;
    border-radius: var(--radius-sm);
    cursor: pointer; font-size: 13px;
    transition: all .15s;
  }
  .btn-icon:hover { border-color: var(--border2); color: var(--text); }

  /* ── Notice ── */
  .notice {
    display: none;
    align-items: center; gap: 10px;
    padding: 12px 16px;
    border-radius: var(--radius-sm);
    font-size: 13px; font-weight: 600;
    margin-bottom: 18px;
    animation: fadeUp .25s ease both;
  }
  .notice.ok  { background: rgba(52,211,153,.1);  color: var(--green);  border: 1px solid rgba(52,211,153,.2); }
  .notice.err { background: rgba(248,113,113,.1); color: var(--red);    border: 1px solid rgba(248,113,113,.2); }
  .notice.show { display: flex; }

  /* ── Table ── */
  .table-wrap { overflow-x: auto; }
  table {
    width: 100%; border-collapse: collapse;
    font-size: 13.5px;
  }
  thead th {
    background: var(--surface2);
    color: var(--text3);
    font-size: 10px; font-weight: 700;
    text-transform: uppercase;
    letter-spacing: .1em;
    padding: 10px 14px;
    text-align: left;
    border-bottom: 1px solid var(--border);
    font-family: 'JetBrains Mono', monospace;
  }
  tbody td {
    padding: 14px;
    border-bottom: 1px solid var(--border);
    color: var(--text2);
    vertical-align: middle;
  }
  tbody tr:last-child td { border-bottom: none; }
  tbody tr { transition: background .15s; }
  tbody tr:hover td { background: rgba(255,255,255,.02); }

  .slug-pill {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px; font-weight: 600;
    color: var(--accent2);
    background: rgba(124,109,250,.1);
    border: 1px solid rgba(124,109,250,.2);
    padding: 4px 10px;
    border-radius: 20px;
    display: inline-block;
  }
  .url-preview {
    max-width: 200px;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    color: var(--text3); font-size: 12px;
    font-family: 'JetBrains Mono', monospace;
  }
  .click-badge {
    display: inline-flex; align-items: center; gap: 5px;
    background: rgba(251,191,36,.1);
    color: var(--yellow);
    border: 1px solid rgba(251,191,36,.2);
    font-size: 12px; font-weight: 700;
    padding: 3px 10px; border-radius: 20px;
    font-family: 'JetBrains Mono', monospace;
  }
  .actions { display: flex; align-items: center; gap: 6px; }

  /* ── Edit Row ── */
  .edit-row { display: none; }
  .edit-row.open { display: table-row; }
  .edit-row td { background: var(--surface2); padding: 0 !important; }
  .edit-inner {
    padding: 18px 14px;
    border-bottom: 1px solid var(--border);
  }
  .edit-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-bottom: 14px;
  }
  .edit-grid .form-full { grid-column: 1 / -1; }

  /* ── Empty State ── */
  .empty {
    text-align: center; padding: 60px 20px;
    color: var(--text3);
  }
  .empty-icon { font-size: 48px; margin-bottom: 12px; filter: grayscale(.3); }
  .empty h3 { font-size: 16px; color: var(--text2); font-weight: 700; margin-bottom: 6px; }
  .empty p { font-size: 13px; }

  /* ── Export/Import strip ── */
  .toolbar {
    display: flex; align-items: center; justify-content: space-between;
    flex-wrap: wrap; gap: 10px;
    margin-bottom: 14px;
  }
  .toolbar-left { display: flex; align-items: center; gap: 8px; }

  /* ── Search ── */
  .search-wrap { position: relative; }
  .search-wrap input {
    background: var(--surface2);
    border: 1.5px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 8px 14px 8px 36px;
    font-size: 13px; color: var(--text);
    font-family: 'Syne', sans-serif;
    outline: none; width: 220px;
    transition: border-color .2s;
  }
  .search-wrap input:focus { border-color: var(--accent); }
  .search-icon {
    position: absolute; left: 11px; top: 50%;
    transform: translateY(-50%);
    color: var(--text3); font-size: 14px; pointer-events: none;
  }

  /* ── Animations ── */
  @keyframes fadeDown {
    from { opacity: 0; transform: translateY(-12px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(10px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes popIn {
    from { opacity: 0; transform: scale(.95) translateY(8px); }
    to   { opacity: 1; transform: scale(1)   translateY(0); }
  }
  .card { animation: fadeUp .4s ease both; }
  .card:nth-child(2) { animation-delay: .08s; }
  .card:nth-child(3) { animation-delay: .16s; }

  /* ── Responsive ── */
  @media (max-width: 640px) {
    .stats { grid-template-columns: 1fr; }
    .form-grid { grid-template-columns: 1fr; }
    .form-full { grid-column: 1; }
    .edit-grid { grid-template-columns: 1fr; }
    .edit-grid .form-full { grid-column: 1; }
    .header { flex-direction: column; align-items: flex-start; gap: 12px; }
    .search-wrap input { width: 100%; }
    .toolbar { flex-direction: column; align-items: flex-start; }
  }

  /* ── OG Preview chip ── */
  .og-chip {
    display: inline-flex; align-items: center; gap: 4px;
    font-size: 11px; color: var(--text3);
    background: var(--surface2);
    border: 1px solid var(--border);
    padding: 2px 8px; border-radius: 4px;
  }
  .og-chip.has { color: var(--green); border-color: rgba(52,211,153,.2); background: rgba(52,211,153,.06); }

  /* ── Toast ── */
  #toast {
    position: fixed; bottom: 30px; right: 30px; z-index: 9999;
    background: var(--surface);
    border: 1px solid var(--border2);
    color: var(--text);
    font-size: 13px; font-weight: 600;
    padding: 12px 20px; border-radius: var(--radius-sm);
    box-shadow: 0 8px 30px rgba(0,0,0,.4);
    display: flex; align-items: center; gap: 8px;
    opacity: 0; transform: translateY(10px);
    transition: opacity .2s, transform .2s;
    pointer-events: none;
  }
  #toast.show { opacity: 1; transform: translateY(0); }
</style>
</head>
<body>

<div class="bg-glow"></div>
<div class="bg-glow2"></div>
<div id="toast"></div>

<div class="container">

  <!-- Header -->
  <div class="header">
    <div class="header-left">
      <div class="logo">🔗</div>
      <div class="header-title">
        <h1>Smart Link Cloaker</h1>
        <p>Offline tool — data saved in your browser</p>
      </div>
    </div>
    <div class="header-badge">● OFFLINE READY</div>
  </div>

  <!-- Stats -->
  <div class="stats" id="statsBar">
    <div class="stat-card">
      <div class="stat-icon purple">🔗</div>
      <div>
        <div class="stat-label">Total Links</div>
        <div class="stat-value" id="statLinks">0</div>
      </div>
    </div>
    <div class="stat-card">
      <div class="stat-icon yellow">👆</div>
      <div>
        <div class="stat-label">Total Clicks</div>
        <div class="stat-value" id="statClicks">0</div>
      </div>
    </div>
    <div class="stat-card">
      <div class="stat-icon green">⚡</div>
      <div>
        <div class="stat-label">Avg Clicks</div>
        <div class="stat-value" id="statAvg">0</div>
      </div>
    </div>
  </div>

  <!-- Create Form -->
  <div class="card">
    <div class="card-title"><div class="dot"></div> Create New Cloaked Link</div>
    <div class="notice" id="formNotice"></div>
    <div class="form-grid">
      <div class="field form-full">
        <label>Target URL *</label>
        <input type="url" id="f_target" placeholder="https://example.com/your-affiliate-link">
      </div>
      <div class="field">
        <label>Custom Slug</label>
        <input type="text" id="f_slug" placeholder="my-link">
        <div class="hint">Link: <span>yourdomain.com/go/<strong>slug</strong></span></div>
      </div>
      <div class="field">
        <label>OG Title</label>
        <input type="text" id="f_title" placeholder="Title shown on social share">
      </div>
      <div class="field">
        <label>OG Description</label>
        <textarea id="f_desc" rows="2" placeholder="Short description for social share"></textarea>
      </div>
      <div class="field">
        <label>OG Image URL</label>
        <input type="url" id="f_img" placeholder="https://example.com/image.jpg">
      </div>
    </div>
    <div style="margin-top:18px">
      <button class="btn btn-primary" id="addBtn" onclick="addLink()">
        🔗 Create Link
      </button>
    </div>
  </div>

  <!-- Links Table -->
  <div class="card" style="animation-delay:.12s">
    <div class="toolbar">
      <div class="card-title" style="margin:0"><div class="dot"></div> All Links</div>
      <div class="toolbar-left">
        <div class="search-wrap">
          <span class="search-icon">🔍</span>
          <input type="text" id="searchInput" placeholder="Search links…" oninput="renderTable()">
        </div>
        <button class="btn btn-ghost" onclick="exportJSON()" title="Export">⬇ Export</button>
        <label class="btn btn-ghost" style="cursor:pointer" title="Import">⬆ Import<input type="file" accept=".json" style="display:none" onchange="importJSON(event)"></label>
      </div>
    </div>
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>Slug</th>
            <th>Target URL</th>
            <th>OG Meta</th>
            <th>Clicks</th>
            <th>Created</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="tbody"></tbody>
      </table>
    </div>
  </div>

</div><!-- /container -->

<script>
// ── Storage Key ──
const KEY = 'slc_links_v1';

// ── Load / Save ──
function load() {
  try { return JSON.parse(localStorage.getItem(KEY)) || []; }
  catch { return []; }
}
function save(data) {
  localStorage.setItem(KEY, JSON.stringify(data));
}

// ── Generate random slug ──
function randSlug() {
  return Math.random().toString(36).slice(2, 9);
}

// ── Date format ──
function fmtDate(ts) {
  return new Date(ts).toLocaleDateString('en-GB', { day:'2-digit', month:'short', year:'numeric' });
}

// ── Notice ──
function notice(msg, type='ok') {
  const el = document.getElementById('formNotice');
  el.className = 'notice ' + type + ' show';
  el.innerHTML = (type==='ok' ? '✅ ' : '❌ ') + msg;
  clearTimeout(el._t);
  el._t = setTimeout(() => el.className='notice', 4000);
}

// ── Toast ──
function toast(msg) {
  const t = document.getElementById('toast');
  t.innerHTML = '✅ ' + msg;
  t.classList.add('show');
  clearTimeout(t._t);
  t._t = setTimeout(() => t.classList.remove('show'), 2500);
}

// ── Stats ──
function updateStats() {
  const links = load();
  const total  = links.length;
  const clicks = links.reduce((s, l) => s + (l.clicks || 0), 0);
  document.getElementById('statLinks').textContent  = total;
  document.getElementById('statClicks').textContent = clicks.toLocaleString();
  document.getElementById('statAvg').textContent    = total ? (clicks / total).toFixed(1) : '0';
}

// ── Add Link ──
function addLink() {
  const target = document.getElementById('f_target').value.trim();
  let   slug   = document.getElementById('f_slug').value.trim()
                   .toLowerCase().replace(/[^a-z0-9-_]/g,'').replace(/\s+/g,'-');
  const title  = document.getElementById('f_title').value.trim();
  const desc   = document.getElementById('f_desc').value.trim();
  const img    = document.getElementById('f_img').value.trim();

  if (!target) { notice('Target URL is required.', 'err'); return; }
  if (!/^https?:\/\//.test(target)) { notice('Enter a valid URL starting with http:// or https://', 'err'); return; }

  const links = load();
  if (!slug) slug = randSlug();
  if (links.find(l => l.slug === slug)) { notice('Slug "' + slug + '" already exists. Choose another.', 'err'); return; }

  const link = {
    id: Date.now(),
    slug, target, title, desc, img,
    clicks: 0,
    created: Date.now()
  };
  links.unshift(link);
  save(links);

  notice('Link created! <strong>/go/' + slug + '</strong>');
  document.getElementById('f_target').value = '';
  document.getElementById('f_slug').value   = '';
  document.getElementById('f_title').value  = '';
  document.getElementById('f_desc').value   = '';
  document.getElementById('f_img').value    = '';

  renderTable();
  updateStats();
}

// ── Delete ──
function deleteLink(id) {
  if (!confirm('Delete this link?')) return;
  const links = load().filter(l => l.id !== id);
  save(links);
  renderTable();
  updateStats();
}

// ── Toggle Edit ──
function toggleEdit(id) {
  const row = document.getElementById('edit-' + id);
  row.classList.toggle('open');
  if (row.classList.contains('open')) {
    row.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  }
}

// ── Save Edit ──
function saveEdit(id) {
  const links = load();
  const idx = links.findIndex(l => l.id === id);
  if (idx === -1) return;
  links[idx].target = document.getElementById('et_'  + id).value.trim();
  links[idx].title  = document.getElementById('eti_' + id).value.trim();
  links[idx].desc   = document.getElementById('ed_'  + id).value.trim();
  links[idx].img    = document.getElementById('ei_'  + id).value.trim();
  save(links);
  toast('Link updated!');
  renderTable();
  updateStats();
}

// ── Copy ──
function copyLink(slug, btn) {
  const url = window.location.origin + '/go/' + slug;
  navigator.clipboard.writeText(url).then(() => {
    const orig = btn.innerHTML;
    btn.innerHTML = '✅';
    toast('Copied: /go/' + slug);
    setTimeout(() => btn.innerHTML = orig, 1800);
  });
}

// ── Simulate Click (manual) ──
function simulateClick(id) {
  const links = load();
  const idx = links.findIndex(l => l.id === id);
  if (idx === -1) return;
  links[idx].clicks = (links[idx].clicks || 0) + 1;
  save(links);
  renderTable();
  updateStats();
}

// ── Export JSON ──
function exportJSON() {
  const data = load();
  if (!data.length) { toast('No links to export.'); return; }
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'slc-links-' + Date.now() + '.json';
  a.click();
  toast('Exported ' + data.length + ' links!');
}

// ── Import JSON ──
function importJSON(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(ev) {
    try {
      const imported = JSON.parse(ev.target.result);
      if (!Array.isArray(imported)) throw new Error();
      const existing = load();
      const merged = [...imported, ...existing.filter(l => !imported.find(i => i.slug === l.slug))];
      save(merged);
      renderTable(); updateStats();
      toast('Imported ' + imported.length + ' links!');
    } catch {
      alert('Invalid JSON file.');
    }
  };
  reader.readAsText(file);
  e.target.value = '';
}

// ── Render Table ──
function renderTable() {
  const query = (document.getElementById('searchInput')?.value || '').toLowerCase();
  const links = load().filter(l =>
    !query ||
    l.slug.includes(query) ||
    l.target.toLowerCase().includes(query) ||
    (l.title || '').toLowerCase().includes(query)
  );

  const tbody = document.getElementById('tbody');

  if (!links.length) {
    tbody.innerHTML = `<tr><td colspan="6">
      <div class="empty">
        <div class="empty-icon">🔗</div>
        <h3>${query ? 'No results found' : 'No links yet'}</h3>
        <p>${query ? 'Try a different search term.' : 'Create your first cloaked link above!'}</p>
      </div>
    </td></tr>`;
    return;
  }

  tbody.innerHTML = links.map(l => {
    const hasOG = l.title || l.desc || l.img;
    return `
    <tr id="row-${l.id}" style="animation: popIn .25s ease both">
      <td><span class="slug-pill">${esc(l.slug)}</span></td>
      <td><div class="url-preview" title="${esc(l.target)}">${esc(l.target)}</div></td>
      <td>
        <span class="og-chip ${hasOG ? 'has' : ''}">
          ${hasOG ? '✓ Set' : '— None'}
        </span>
      </td>
      <td><span class="click-badge">👆 ${(l.clicks||0).toLocaleString()}</span></td>
      <td style="color:var(--text3);font-size:12px;font-family:'JetBrains Mono',monospace">${fmtDate(l.created)}</td>
      <td>
        <div class="actions">
          <button class="btn-icon" onclick="copyLink('${esc(l.slug)}',this)" title="Copy cloaked URL">📋</button>
          <button class="btn-icon" onclick="toggleEdit(${l.id})" title="Edit">✏️</button>
          <button class="btn-icon" onclick="simulateClick(${l.id})" title="Add click (+1)">👆</button>
          <button class="btn btn-danger" onclick="deleteLink(${l.id})">🗑</button>
        </div>
      </td>
    </tr>
    <tr class="edit-row" id="edit-${l.id}">
      <td colspan="6">
        <div class="edit-inner">
          <div class="edit-grid">
            <div class="field form-full">
              <label>Target URL</label>
              <input type="url" id="et_${l.id}" value="${esc(l.target)}">
            </div>
            <div class="field">
              <label>OG Title</label>
              <input type="text" id="eti_${l.id}" value="${esc(l.title||'')}">
            </div>
            <div class="field">
              <label>OG Description</label>
              <textarea id="ed_${l.id}" rows="2">${esc(l.desc||'')}</textarea>
            </div>
            <div class="field form-full">
              <label>OG Image URL</label>
              <input type="url" id="ei_${l.id}" value="${esc(l.img||'')}">
            </div>
          </div>
          <button class="btn btn-primary" onclick="saveEdit(${l.id})">💾 Save Changes</button>
          <button class="btn btn-ghost" style="margin-left:8px" onclick="toggleEdit(${l.id})">Cancel</button>
        </div>
      </td>
    </tr>`;
  }).join('');
}

// ── Escape HTML ──
function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── Enter key on form ──
document.addEventListener('keydown', e => {
  if (e.key === 'Enter' && e.target.id === 'f_slug') addLink();
});

// ── Init ──
renderTable();
updateStats();
</script>
</body>
</html>
